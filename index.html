<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Structure Generator</title>
  <link rel="stylesheet" href="/src/web/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <h1>AI Structure Generator</h1>
      <button id="settings-btn" title="Einstellungen">⚙</button>
    </header>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Einstellungen</h2>
        <label>
          Provider
          <select id="provider-select">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic (Claude)</option>
          </select>
        </label>
        <div id="openai-settings">
          <label>
            OpenAI API Key
            <input type="password" id="api-key-input" placeholder="sk-..." />
          </label>
          <label>
            Modell
            <select id="model-select">
              <option value="gpt-4o-mini">GPT-4o Mini (schnell & günstig)</option>
              <option value="gpt-4o">GPT-4o</option>
              <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
              <option value="gpt-4.1">GPT-4.1</option>
              <option value="gpt-5.1">GPT-5.1</option>
              <option value="gpt-5.2">GPT-5.2</option>
              <option value="gpt-5.4">GPT-5.4</option>
            </select>
          </label>
        </div>
        <div id="anthropic-settings" class="hidden">
          <label>
            Anthropic API Key
            <input type="password" id="anthropic-key-input" placeholder="sk-ant-..." />
          </label>
          <label>
            Modell
            <select id="anthropic-model-select">
              <option value="claude-sonnet-4-20250514">Claude Sonnet 4 (schnell & günstig)</option>
              <option value="claude-opus-4-20250514">Claude Opus 4</option>
              <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (am schnellsten)</option>
            </select>
          </label>
        </div>
        <div class="modal-actions">
          <button id="save-settings">Speichern</button>
          <button id="close-settings" class="secondary">Schließen</button>
        </div>
      </div>
    </div>

    <!-- Main Layout -->
    <div id="main">
      <!-- 3D Viewport -->
      <div id="viewport">
        <canvas id="scene-canvas"></canvas>
        <div id="scene-info">
          <span id="primitive-count">0 Primitives</span>
          <span id="step-count">Schritt 0</span>
        </div>
      </div>

      <!-- Sidebar -->
      <aside id="sidebar">
        <!-- Prompt Input -->
        <section id="prompt-section">
          <h3>Prompt</h3>
          <textarea id="prompt-input" rows="3" placeholder="Beschreibe ein Objekt, z.B. 'Erzeuge einen Tisch'"></textarea>
          <div class="toggle-row">
            <label class="toggle-label" for="parallel-toggle">
              <span class="toggle-text">Parallel Pipeline</span>
              <div class="toggle-switch">
                <input type="checkbox" id="parallel-toggle" />
                <span class="toggle-slider"></span>
              </div>
            </label>
          </div>
          <div class="button-row">
            <button id="generate-btn" class="primary">Neu generieren</button>
            <button id="extend-btn" class="secondary" disabled>Erweitern</button>
          </div>
          <div class="button-row">
            <button id="step-btn" class="secondary" disabled>Nächster Schritt</button>
            <button id="undo-btn" class="secondary" disabled>Undo</button>
            <button id="reset-btn" class="danger-outline">Reset</button>
          </div>
        </section>

        <!-- Plan -->
        <section id="plan-section" class="hidden">
          <h3>Plan</h3>
          <div id="plan-display"></div>
        </section>

        <!-- Log -->
        <section id="log-section">
          <h3>Log</h3>
          <div id="log"></div>
        </section>
      </aside>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
